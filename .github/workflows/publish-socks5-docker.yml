name: Publish Shadowsocks Docker Image

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC (change if you want)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

env:
  IMAGE_NAME: alektron/socks5

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get latest Shadowsocks version
        id: get-version
        run: |
          REPO="shadowsocks/shadowsocks-rust"

          LATEST_VERSION=$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" \
            | jq -r '.tag_name')

          CLEAN_VERSION=${LATEST_VERSION#v}

          echo "LATEST_VERSION=${CLEAN_VERSION}" >> $GITHUB_ENV
          echo "Latest upstream version: ${CLEAN_VERSION}"

      - name: Check if this version is already published
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE_NAME }}:${{ env.LATEST_VERSION }} > /dev/null 2>&1; then
            echo "VERSION_EXISTS=true" >> $GITHUB_ENV
            echo "✅ Version ${{ env.LATEST_VERSION }} already exists — skipping build."
          else
            echo "VERSION_EXISTS=false" >> $GITHUB_ENV
            echo "🔄 New version detected — will build and push."
          fi

      - name: Build and push Docker image
        if: env.VERSION_EXISTS == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.LATEST_VERSION }}
          build-args: |
            VERSION=${{ env.LATEST_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max